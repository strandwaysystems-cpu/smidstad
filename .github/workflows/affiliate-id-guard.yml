name: Affiliate ID Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for raw affiliate patterns
        run: |
          # Fail if unparameterised affiliate IDs are hardcoded in source
          if grep -rE "(ref=|affiliate_id=|aff_id=|partner_id=)[A-Za-z0-9_-]+" \
               --include="*.astro" --include="*.html" --include="*.js" --include="*.ts" \
               src/ public/ 2>/dev/null; then
            echo "::error::Hardcoded affiliate ID detected. Use environment variables instead."
            exit 1
          fi
          echo "Affiliate ID guard passed ✓"
